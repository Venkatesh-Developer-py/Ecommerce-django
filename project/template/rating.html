<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rate Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f3f6f9;
}

/* CONTAINER */
.rating-box{
    width:380px;
    margin:90px auto;
    background:#ffffff;
    padding:30px 28px;
    border-radius:22px;
    box-shadow:0 20px 45px rgba(0,0,0,0.15);
    text-align:center;
}

.rating-box h3{
    margin-bottom:8px;
    font-weight:700;
    color:#0f172a;
}

.rating-box p{
    font-size:14px;
    color:#6b7280;
    margin-bottom:12px;
}

/* RATING TEXT */
#ratingText{
    font-size:16px;
    font-weight:700;
    color:#f59e0b;
    margin-bottom:15px;
}

/* STARS */
.stars{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.stars input{
    display:none;
}

.stars label{
    font-size:36px;
    color:#cbd5e1;
    cursor:pointer;
    transition:0.3s;
}

/* hover */
.stars label:hover,
.stars label:hover ~ label{
    color:#facc15;
}

/* selected */
.stars input:checked ~ label{
    color:#facc15;
}

/* REVIEW */
textarea{
    width:100%;
    height:90px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    font-size:14px;
    outline:none;
    resize:none;
    margin-bottom:18px;
}

textarea:focus{
    border-color:#0f172a;
    box-shadow:0 0 0 3px rgba(15,23,42,0.15);
}

/* BUTTON */
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:16px;
    background:#0f172a;
    color:#ffffff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    background:#020617;
}

/* THANK YOU */
.thanks{
    display:none;
    font-size:16px;
    font-weight:600;
    color:#16a34a;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="rating-box">
    <h3>⭐ Rate this Product</h3>
    <p>Your feedback helps us improve</p>

    <!-- ⭐ LIVE RATING TEXT -->
    <div id="ratingText">Select a rating</div>

    <form id="ratingForm">
        {% csrf_token %}

        <div class="stars">
            <input type="radio" name="rating" id="star1" value="1">
            <label for="star1" class="bi bi-star-fill"></label>

            <input type="radio" name="rating" id="star2" value="2">
            <label for="star2" class="bi bi-star-fill"></label>

            <input type="radio" name="rating" id="star3" value="3">
            <label for="star3" class="bi bi-star-fill"></label>

            <input type="radio" name="rating" id="star4" value="4">
            <label for="star4" class="bi bi-star-fill"></label>

            <input type="radio" name="rating" id="star5" value="5">
            <label for="star5" class="bi bi-star-fill"></label>
        </div>

        <textarea name="review" placeholder="Write your review here..."></textarea>

        <button type="submit">Submit Rating</button>
    </form>

    <!-- THANK YOU MESSAGE -->
    <div class="thanks" id="thanksMsg">
        ❤️ Thanks for your feedback!
    </div>
</div>

<script>
const ratingForm = document.getElementById("ratingForm");
const ratingText = document.getElementById("ratingText");

const ratingMessages = {
    5: "😞 Poor",
    4: "😐 Fair",
    3: "🙂 Good",
    2: "😄 Very Good",
    1: "🤩 Excellent"
};

// change text on star click
document.querySelectorAll('input[name="rating"]').forEach(star => {
    star.addEventListener("change", function () {
        ratingText.textContent = ratingMessages[this.value];
    });
});

// submit behaviour
ratingForm.addEventListener("submit", function(e){
    e.preventDefault();

    const ratingChecked = document.querySelector('input[name="rating"]:checked');

    if(!ratingChecked){
        alert("Please select a star rating ⭐");
        return;
    }

    ratingForm.style.display = "none";
    document.getElementById("thanksMsg").style.display = "block";
});
</script>

</body>
</html>
