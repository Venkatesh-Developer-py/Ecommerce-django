<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f3f6f9;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:10px;
}

h2{
    margin-bottom:25px;
    font-weight:700;
    color:#111827;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

/* LINK RESET */
.card-link{
    text-decoration:none;
    color:inherit;
    display:block;
}

/* CARD */
.card{
    background:#fff;
    border-radius:20px;
    padding:28px 26px;
    display:flex;
    gap:20px;
    align-items:center;
    min-height:130px;
    box-shadow:0 12px 30px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 22px 45px rgba(0,0,0,0.18);
}

/* ICON */
.icon{
    font-size:42px;
    color:#2563eb;
}

/* TEXT */
.card h4{
    margin:0;
    font-size:18px;
    font-weight:700;
}

.card p{
    margin-top:6px;
    font-size:14px;
    color:#6b7280;
}
</style>
</head>

<body>

<div class="container">
    <h2>Your Account</h2>

    <div class="grid">

        <!-- YOUR ORDERS -->
        <a href="{% url 'orders' %}" class="card-link">
            <div class="card">
                <div class="icon"><i class="bi bi-box-seam"></i></div>
                <div>
                    <h4>Your Orders</h4>
                    <p>Track, return, or buy again</p>
                </div>
            </div>
        </a>

        <!-- ADDRESSES -->
        <a href="{% url 'nav_address' %}" class="card-link">
            <div class="card">
                <div class="icon"><i class="bi bi-geo-alt"></i></div>
                <div>
                    <h4>Your Addresses</h4>
                    <p>Edit addresses for orders</p>
                </div>
            </div>
        </a>

        <!-- LOGIN & SECURITY -->
        <a href="{% url 'account'%}" class="card-link">
            <div class="card">
                <div class="icon"><i class="bi bi-shield-lock"></i></div>
                <div>
                    <h4>Login & Security</h4>
                    <p>Edit login, name, mobile</p>
                </div>
            </div>
        </a>

        <!-- PAYMENT OPTIONS -->
        <a href="{% url 'payments' %}" class="card-link">
            <div class="card">
                <div class="icon"><i class="bi bi-credit-card"></i></div>
                <div>
                    <h4>Payment Options</h4>
                    <p>Add or edit payment methods</p>
                </div>
            </div>
        </a>

        <!-- PRIME -->
        <a href="{% url 'prime' %}" class="card-link">
            <div class="card">
                <div class="icon"><i class="bi bi-star"></i></div>
                <div>
                    <h4>Prime</h4>
                    <p>View benefits and settings</p>
                </div>
            </div>
        </a>

        <!-- CONTACT US -->
        <a href="{% url 'contactus' %}" class="card-link">
            <div class="card">
                <div class="icon"><i class="bi bi-headset"></i></div>
                <div>
                    <h4>Contact Us</h4>
                    <p>Customer service via chat</p>
                </div>
            </div>
        </a>

    </div>
</div>
<script>
  window.addEventListener("pageshow", function (event) {
    if (event.persisted) {
      window.location.reload();
    }
  });
</script>

</body>
</html>
