<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delivery Address</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f3f6f9;
}

.container{
    max-width:480px;
    margin:60px auto;
}

.customer-form{
    background:#ffffff;
    padding:32px 30px;
    border-radius:22px;
    box-shadow:0 20px 45px rgba(0,0,0,0.15);
}

.customer-form h3{
    text-align:center;
    font-weight:700;
    margin-bottom:25px;
    color:#0f172a;
}

.customer-form label{
    display:block;
    font-weight:600;
    margin-bottom:6px;
    color:#0f172a;
}

.customer-form input,
.customer-form textarea,
.customer-form select{
    width:100%;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.customer-form textarea{
    resize:none;
    height:90px;
}

.customer-form input:focus,
.customer-form textarea:focus,
.customer-form select:focus{
    border-color:#0f172a;
    box-shadow:0 0 0 3px rgba(15,23,42,0.15);
}

.field{
    margin-bottom:18px;
}

.row{
    display:flex;
    gap:12px;
}

.row .field{
    flex:1;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:#0f172a;
    color:#ffffff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    background:#020617;
}
</style>
</head>

<body>

<div class="container">
<form method="POST" class="customer-form">
{% csrf_token %}

<h3>📦 Delivery Address</h3>


<div class="field">
    <label>Full Name</label>
    <input type="text" value="{{ request.session.display_name }}" >
</div>


<div class="field">
    <label>Mobile Number</label>
    <input type="text" name="phone" placeholder="Enter mobile number" required>
</div>


<div class="field">
    <label>Gender</label>
    <select name="gender">
        <option value="">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select>
</div>

<!-- ADDRESS -->
<div class="field">
    <label>House No, Street, Area</label>
    <textarea name="address" placeholder="Flat / House No, Street, Landmark"></textarea>
</div>

<div class="row">
    <div class="field">
        <label>City</label>
        <input type="text" name="city" placeholder="City" required>
    </div>

    <div class="field">
        <label>Pincode</label>
        <input type="text" name="pincode" placeholder="Pincode" required>
    </div>
</div>

<button type="submit" class="btn">
  Save & Continue
</button>



</form>
</div>
<script>
  window.addEventListener("pageshow", function (event) {
    if (event.persisted) {
      window.location.reload();
    }
  });
</script>

</body>
</html>
